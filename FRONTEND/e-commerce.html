
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlumbLink – Plumbing Materials Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-grad: linear-gradient(135deg, #2a9d66 0%, #1f7a4d 100%);
      --card-bg: #ffffff;
      --text-dark: #0b3d2e;
      --text-light: #555;
      --shadow: 0 10px 25px rgba(42,157,102,0.10);
      --radius: 14px;
      --accent: #ff6b35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Poppins, sans-serif; }

    body {
      background: #f4faff;
      overflow-x: hidden;
    }

    /* ==== NAVBAR ==== */
    .navbar {
      background: var(--bg-grad);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .nav-actions button {
      background: #fff;
      color: #2a9d66;
      border: none;
      padding: 11px 20px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      margin: 0 6px;
    }
    
    .nav-actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(42,157,102,0.2);
    }

    /* ==== HERO ==== */
    .hero {
      background: var(--bg-grad);
      padding: 80px 20px 60px;
      color: #fff;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      text-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    
    .hero p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    .search-bar {
      margin: 25px auto;
      max-width: 550px;
      width: 90%;
      padding: 15px 18px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
    }
    
    .search-bar:focus {
      outline: none;
    }

    .product-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #f0f0f0;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(42,157,102,0.12);
      border-color: #e8f7ee;
    }

    .product-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-6px);
    }

    .product-img img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .product-info {
      padding: 1rem;
    }

    .product-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .product-price {
      margin: 6px 0;
    }

    .add-quick {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 11px 14px;
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(255,107,53,0.2);
      transition: all 0.3s ease;
    }

    .add-quick:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255,107,53,0.3);
    }

    /* ==== CART DRAWER ==== */
    .cart-drawer {
      position: fixed;
      right: -420px;
      top: 0;
      width: 380px;
      height: 100vh;
      background: #fff;
      box-shadow: -5px 0 25px rgba(0,0,0,0.15);
      padding: 20px;
      transition: 0.4s;
      z-index: 2000;
    }

    .cart-drawer.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-items {
      margin-top: 20px;
      height: 65vh;
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 20px;
      background: var(--accent);
      color: #fff;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ==== PRODUCT MODAL ==== */
    .modal-overlay {
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .modal {
      width: 90%;
      max-width: 520px;
      background: #fff;
      padding: 20px;
      border-radius: 14px;
    }

    /* ==== UPLOAD MODAL ==== */
    .upload-modal-overlay {
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3001;
    }

    .upload-modal {
      width: 90%;
      max-width: 600px;
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .upload-modal h2 {
      color: var(--text-dark);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e8f0;
      border-radius: 8px;
      font-family: Poppins, sans-serif;
      font-size: 1rem;
      transition: 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(0, 183, 255, 0.2);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .upload-area {
      border: 2px dashed var(--accent);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      background: #fef5f0;
    }

    .upload-area:hover {
      background: #ffe6d9;
      border-color: #ff6b35;
    }

    .upload-area.dragover {
      background: #ffd6c0;
      border-color: #ff6b35;
    }

    .upload-area p {
      color: var(--text-light);
      margin: 10px 0;
    }

    .upload-area .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    #fileInput {
      display: none;
    }

    .image-preview {
      margin-top: 15px;
      text-align: center;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .upload-buttons {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .upload-buttons button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit {
      background: var(--accent);
      color: #fff;
    }

    .btn-submit:hover {
      opacity: 0.95;
    }

    .btn-cancel {
      background: #f0f0f0;
      color: var(--text-dark);
    }

    .btn-cancel:hover {
      background: #e0e0e0;
    }

    .upload-toggle-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }

    .upload-toggle-btn:hover {
      opacity: 0.95;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">PlumbLink Store</div>
    <div class="nav-actions">
      <button onclick="openCart()">Cart (<span id='cartCount'>0</span>)</button>
      <button class="upload-toggle-btn" onclick="openUploadModal()">+ Upload Product</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:2rem;padding:0 20px;flex-wrap:wrap;">
      <div style="flex:1;min-width:300px;">
        <h1>Premium Plumbing Materials & Tools</h1>
        <p>Buy high-quality pipes, valves, fittings, tools & more.</p>
        <input type="text" id="search" class="search-bar" placeholder="Search products…" style="margin:20px 0;">
      </div>
      <div style="flex:1;min-width:300px;text-align:center;">
        <img src="https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=400&h=350&fit=crop" alt="Plumbing tools and supplies" style="width:100%;max-width:380px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.2);">
      </div>
    </div>
  </section>

  <!-- PRODUCT GRID -->
  <section class="product-grid" id="productGrid"></section>

  <!-- CART DRAWER -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button onclick="closeCart()">✖</button>
    </div>

    <div id="cartItems" class="cart-items"></div>

    <button class="checkout-btn" onclick="openCheckout()">Checkout</button>
  </aside>

  <!-- CHECKOUT MODAL -->
  <div class="modal-overlay" id="checkoutModal" style="display:none;">
    <div class="modal" style="max-width:520px;">
      <h3>Checkout</h3>
      <div id="checkoutError" class="error-message" style="display:none;"></div>
      <div style="margin:12px 0;">
        <strong>Amount:</strong> ₹<span id="checkoutAmount">0</span>
      </div>

      <div style="margin:12px 0;">
        <label style="display:block;margin-bottom:8px;font-weight:600;">Choose payment method</label>
        <select id="paymentMethod" style="width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef0;">
          <option value="qr">QR / UPI (Scan to pay)</option>
          <option value="upi">UPI Intent</option>
          <option value="card">Debit/Credit Card (mock)</option>
          <option value="cash">Cash on Delivery</option>
        </select>
      </div>

      <div id="paymentArea" style="margin-top:12px;"></div>

      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="checkout-btn" id="startPaymentBtn">Start Payment</button>
        <button onclick="closeCheckout()" style="width:100%;padding:12px;border-radius:10px;background:#eee;border:none;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ======================
       PRODUCT MODAL
  ======================= -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h3 id="modalName"></h3>
      <img id="modalImg" style="width:100%;border-radius:10px;margin:10px 0;">

      <p id="modalPrice"></p>

      <button class="checkout-btn" id="modalAddBtn">Add to Cart</button>

      <button onclick="closeModal()" style="margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;background:#eee;font-weight:600;cursor:pointer;">Close</button>
    </div>
  </div>

  <!-- ======================
       UPLOAD PRODUCT MODAL
  ======================= -->
  <div class="upload-modal-overlay" id="uploadModal">
    <div class="upload-modal">
      <h2>Upload New Product</h2>
      
      <div class="success-message" id="successMessage">✓ Product added successfully!</div>
      <div class="error-message" id="errorMessage"></div>

      <form id="uploadForm" onsubmit="handleUpload(event)">
        
        <div class="form-group">
          <label for="productName">Product Name *</label>
          <input type="text" id="productName" placeholder="e.g., PVC Pipe 1 Inch" required>
        </div>

        <div class="form-group">
          <label for="productPrice">Price (₹) *</label>
          <input type="number" id="productPrice" placeholder="e.g., 180" min="1" required>
        </div>

        <div class="form-group">
          <label for="productDesc">Description</label>
          <textarea id="productDesc" placeholder="Describe your product..."></textarea>
        </div>

        <div class="form-group">
          <label>Product Image *</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="icon">📸</div>
            <p><strong>Click to upload or drag & drop</strong></p>
            <p style="font-size: 0.9rem;">PNG, JPG or GIF (Max 5MB)</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
          <div class="image-preview" id="imagePreview"></div>
        </div>

        <div class="upload-buttons">
          <button type="submit" class="btn-submit">Add Product</button>
          <button type="button" class="btn-cancel" onclick="closeUploadModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script>

    /* ============================
       PRODUCT DATABASE (REAL IMAGES)
    ============================ */
    const products = [
      {
        id: 1,
        name: "PVC Pipe 1 Inch (10 ft)",
        price: 180,
        img: "https://m.media-amazon.com/images/I/61HS4Y5EONL.jpg"
      },
      {
        id: 2,
        name: "Brass Ball Valve ¾ Inch",
        price: 260,
        img: "https://m.media-amazon.com/images/I/61jZHXz7d7L._SL1500_.jpg"
      },
      {
        id: 3,
        name: "Heavy Duty Pipe Wrench 14 Inch",
        price: 499,
        img: "https://m.media-amazon.com/images/I/61H3CSW0NCL._SL1500_.jpg"
      },
      {
        id: 4,
        name: "Copper Elbow 90° ½ Inch",
        price: 55,
        img: "https://m.media-amazon.com/images/I/71y1zszbmZL._SL1500_.jpg"
      },
      {
        id: 5,
        name: "Teflon Tape (Pack of 10)",
        price: 79,
        img: "https://m.media-amazon.com/images/I/51fc6zkRg-L._SL1000_.jpg"
      },
      {
        id: 6,
        name: "25 ft Drain Cleaning Snake",
        price: 340,
        img: "https://m.media-amazon.com/images/I/61PCr0vS0-L._SL1200_.jpg"
      },
      {
        id: 7,
        name: "Bathroom Sink Tap – Chrome Finish",
        price: 890,
        img: "https://m.media-amazon.com/images/I/61LQhQYmRM._SL1500_.jpg"
      },
      {
        id: 8,
        name: "Kitchen Sink Spray Nozzle",
        price: 299,
        img: "https://m.media-amazon.com/images/I/71d2mP88lzL._SL1500_.jpg"
      }
    ];

    /* Render Products */
    function renderProducts(list = products) {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="openModal(${p.id})">
          <div class="product-img">
            <img src="${p.img}">
          </div>
          <div class="product-info">
            <h3 class="product-title">${p.name}</h3>
            <p class="product-price">₹${p.price}</p>
            <button class="add-quick" onclick="addToCart(${p.id}); event.stopPropagation();">Add to Cart</button>
          </div>
        </div>
      `).join("");
    }
    renderProducts();


    /* =============================
        SEARCH BAR
    ============================== */
    document.getElementById("search").addEventListener("input", function(){
      const q = this.value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(q));
      renderProducts(filtered);
    });

    /* =============================
        CART SYSTEM
    ============================== */
    let cart = [];

    function addToCart(id){
      const item = products.find(p => p.id === id);
      cart.push(item);
      updateCartUI();
    }

    function updateCartUI(){
      document.getElementById("cartCount").innerText = cart.length;

      const items = cart.map(p => `
        <div class="cart-item">
          <span>${p.name}</span>
          <strong>₹${p.price}</strong>
        </div>
      `).join("");

      document.getElementById("cartItems").innerHTML = items;
    }

    function openCart(){
      document.getElementById("cartDrawer").classList.add("open");
    }

    function closeCart(){
      document.getElementById("cartDrawer").classList.remove("open");
    }

    /* =============================
        PRODUCT MODAL
    ============================== */
    function openModal(id){
      const p = products.find(x => x.id === id);
      document.getElementById("modalName").innerText = p.name;
      document.getElementById("modalImg").src = p.img;
      document.getElementById("modalPrice").innerText = "₹" + p.price;

      document.getElementById("modalAddBtn").onclick = () => addToCart(id);

      document.getElementById("productModal").style.display = "flex";
    }

    function closeModal(){
      document.getElementById("productModal").style.display = "none";
    }

    /* =============================
        UPLOAD PRODUCT SYSTEM
    ============================== */
    let selectedFile = null;

    // Drag and drop functionality
    const uploadArea = document.getElementById("uploadArea");
    
    uploadArea.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadArea.classList.add("dragover");
    });

    uploadArea.addEventListener("dragleave", () => {
      uploadArea.classList.remove("dragover");
    });

    uploadArea.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadArea.classList.remove("dragover");
      const files = e.dataTransfer.files;
      if(files.length > 0) {
        handleFileSelect({ target: { files: files } });
      }
    });

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if(!file) return;

      // Validate file type
      if(!file.type.startsWith("image/")) {
        showError("Please upload an image file");
        return;
      }

      // Validate file size (5MB max)
      if(file.size > 5 * 1024 * 1024) {
        showError("File size must be less than 5MB");
        return;
      }

      selectedFile = file;
      const reader = new FileReader();
      
      reader.onload = (event) => {
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
        clearError();
      };
      
      reader.readAsDataURL(file);
    }

    function handleUpload(e) {
      e.preventDefault();
      
      const name = document.getElementById("productName").value.trim();
      const price = document.getElementById("productPrice").value;
      const desc = document.getElementById("productDesc").value.trim();

      // Validate inputs
      if(!name || !price) {
        showError("Product name and price are required");
        return;
      }

      if(!selectedFile) {
        showError("Please upload a product image");
        return;
      }

      if(price <= 0) {
        showError("Price must be greater than 0");
        return;
      }

      // Create a Data URL for the image
      const reader = new FileReader();
      reader.onload = (event) => {
        const imageUrl = event.target.result;
        
        // Create new product object
        const newProduct = {
          id: products.length + 1,
          name: name,
          price: parseInt(price),
          img: imageUrl,
          description: desc,
          uploadedAt: new Date().toLocaleString()
        };

        // Add to products array
        products.unshift(newProduct);
        
        // Save to localStorage
        const existingProducts = JSON.parse(localStorage.getItem('plumbing_products')) || [];
        existingProducts.unshift(newProduct);
        localStorage.setItem('plumbing_products', JSON.stringify(existingProducts));

        // Re-render products
        renderProducts();

        // Reset form
        document.getElementById("uploadForm").reset();
        selectedFile = null;
        document.getElementById("imagePreview").innerHTML = "";

        // Show success message
        showSuccess();

        // Close modal after 2 seconds
        setTimeout(() => {
          closeUploadModal();
        }, 2000);
      };
      reader.readAsDataURL(selectedFile);
    }

    function openUploadModal() {
      document.getElementById("uploadModal").style.display = "flex";
      clearError();
    }

    function closeUploadModal() {
      document.getElementById("uploadModal").style.display = "none";
      document.getElementById("uploadForm").reset();
      selectedFile = null;
      document.getElementById("imagePreview").innerHTML = "";
    }

    function showSuccess() {
      const msg = document.getElementById("successMessage");
      msg.style.display = "block";
      setTimeout(() => {
        msg.style.display = "none";
      }, 3000);
    }

    function showError(message) {
      const msg = document.getElementById("errorMessage");
      msg.textContent = "❌ " + message;
      msg.style.display = "block";
    }

    function clearError() {
      document.getElementById("errorMessage").style.display = "none";
    }

    // Load products from localStorage on page load
    window.addEventListener("load", () => {
      const savedProducts = JSON.parse(localStorage.getItem('plumbing_products'));
      if(savedProducts && savedProducts.length > 0) {
        products.unshift(...savedProducts);
        renderProducts();
      }
      // ensure cart UI is fresh
      updateCartUI();
    });


    /* =============================
        CHECKOUT FLOW
    ============================== */
    function openCheckout(){
      if(cart.length === 0){
        alert('Your cart is empty'); return;
      }
      const total = cart.reduce((s,i)=> s + (i.price||0), 0);
      document.getElementById('checkoutAmount').innerText = total;
      document.getElementById('paymentArea').innerHTML = '';
      document.getElementById('checkoutError').style.display = 'none';
      document.getElementById('checkoutModal').style.display = 'flex';

      document.getElementById('startPaymentBtn').onclick = () => startPayment(total);
    }

    function closeCheckout(){ document.getElementById('checkoutModal').style.display = 'none'; }

    async function startPayment(amount){
      const method = document.getElementById('paymentMethod').value;
      const payload = { cart, amount, payment_method: method };

      const btn = document.getElementById('startPaymentBtn');
      const prev = btn.textContent; btn.textContent = 'Processing...'; btn.disabled = true;
      try{
        const res = await fetch('http://localhost:5000/api/checkout/create', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(!res.ok || !data.success){
          throw new Error(data.error || 'Failed to create payment');
        }

        const order = data.order;
        // handle methods
        if(method === 'qr' || method === 'upi'){
          // For UPI intent we try to open the UPI URI directly on the device.
          if(method === 'upi') showUPIIntent(order);
          else showQRCode(order);
        } else if(method === 'card'){
          showCardForm(order);
        } else if(method === 'cash'){
          showCashConfirm(order);
        }
      }catch(err){
        const e = document.getElementById('checkoutError'); e.textContent = 'Error: ' + err.message; e.style.display = 'block';
      }finally{ btn.textContent = prev; btn.disabled = false; }
    }

    function showQRCode(order){
      const area = document.getElementById('paymentArea');
      area.innerHTML = `
        <p style="margin-bottom:8px;">Scan this QR with your UPI app to pay ₹${order.amount}</p>
        <img src="${order.qr_url}" alt="QR code" style="width:260px;height:260px;display:block;margin:0 auto;border-radius:8px;"> 
        <p style="margin-top:8px;text-align:center;"><button onclick="confirmPaid('${order.id}')" style="padding:10px 16px;border-radius:8px;background:#2a9d66;color:#fff;border:none;">I've paid (Confirm)</button></p>
      `;
    }

    function showUPIIntent(order){
      const area = document.getElementById('paymentArea');
      // Provide direct intent opener and QR fallback. On Android this should open the UPI app chooser.
      area.innerHTML = `
        <p style="margin-bottom:8px;">Tap the button below to open your UPI app and pay ₹${order.amount}.</p>
        <div style="display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:12px;">
          <button id="openUpiBtn" style="padding:10px 14px;border-radius:8px;background:#2a9d66;color:#fff;border:none;">Open UPI App</button>
          <button onclick="navigator.clipboard && navigator.clipboard.writeText('${order.upi_uri}')" style="padding:10px 14px;border-radius:8px;background:#eee;border:none;">Copy UPI ID</button>
        </div>
        <div id="upiFallback" style="text-align:center;display:none;">
          <p style="margin-bottom:8px;">If your UPI app did not open, scan this QR instead:</p>
          <img src="${order.qr_url}" alt="QR code" style="width:220px;height:220px;display:block;margin:0 auto;border-radius:8px;">
        </div>
        <p style="margin-top:10px;text-align:center;"><button onclick="confirmPaid('${order.id}')" style="padding:8px 12px;border-radius:8px;background:#2a9d66;color:#fff;border:none;">I've paid (Confirm)</button></p>
      `;

      // Attempt to open UPI URI when user clicks
      const btn = document.getElementById('openUpiBtn');
      btn.addEventListener('click', () => {
        // Try direct navigation to upi:// URI
        window.location.href = order.upi_uri;

        // Show QR fallback after short delay in case the intent did not open
        setTimeout(() => {
          const fb = document.getElementById('upiFallback');
          if (fb) fb.style.display = 'block';
        }, 1500);
      });
    }

    function showCardForm(order){
      const area = document.getElementById('paymentArea');
      area.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px;">
          <input placeholder="Card number (mock)" id="cardNumber" style="padding:10px;border-radius:8px;border:1px solid #e6eef0;">
          <input placeholder="MM/YY" id="cardExpiry" style="padding:10px;border-radius:8px;border:1px solid #e6eef0;">
          <input placeholder="CVV" id="cardCvv" style="padding:10px;border-radius:8px;border:1px solid #e6eef0;">
          <button onclick="mockCardPay('${order.id}')" class="checkout-btn">Pay ₹${order.amount}</button>
        </div>
      `;
    }

    async function mockCardPay(orderId){
      // simulate card payment completion by calling confirm endpoint
      const res = await fetch('http://localhost:5000/api/checkout/confirm', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({order_id: orderId, method: 'card'})});
      const data = await res.json();
      if(res.ok && data.success){
        alert('Payment successful (mock). Thank you!');
        cart = []; updateCartUI(); closeCheckout();
      } else alert('Payment failed: ' + (data.error||'unknown'));
    }

    async function confirmPaid(orderId){
      const res = await fetch('http://localhost:5000/api/checkout/confirm', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({order_id: orderId})});
      const data = await res.json();
      if(res.ok && data.success){
        alert('Payment confirmed. Thank you!'); cart = []; updateCartUI(); closeCheckout();
      } else {
        alert('Could not confirm payment yet. Please check after payment.');
      }
    }

    function showCashConfirm(order){
      const area = document.getElementById('paymentArea');
      area.innerHTML = `<p>Order created. Please pay ₹${order.amount} in cash when the delivery is made.</p><p><button onclick="finalizeCash('${order.id}')" class="checkout-btn">Confirm Order (Cash)</button></p>`;
    }

    async function finalizeCash(orderId){
      // For cash, we consider order placed but unpaid; still mark created
      alert('Order placed. Thank you!'); cart = []; updateCartUI(); closeCheckout();
    }


  </script>

</body>
</html>
