<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Booking Details — PlumbLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin:0; padding:24px; background:#f6f8fa; color:#102a43; }
    .container{max-width:900px;margin:24px auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 12px 30px rgba(16,42,67,0.08)}
    h1{font-size:1.6rem;margin-bottom:8px}
    .meta{color:#627d98;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
    .card{background:#f8fafc;border:1px solid #e6eef5;padding:14px;border-radius:10px}
    .label{font-size:0.8rem;color:#52667a;text-transform:uppercase;margin-bottom:6px}
    .value{font-weight:700;color:#102a43}
    .actions{display:flex;gap:8px;margin-top:12px}
    .btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .btn.primary{background:#1565c0;color:#fff}
    .btn.secondary{background:#eef3f8;color:#1565c0}
    pre{white-space:pre-wrap;background:#f1f7fb;padding:12px;border-radius:8px;border:1px solid #e6eef5}
    @media(max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <h1>Booking Details</h1>
    <div class="meta" id="metaText">Loading booking...</div>

    <div id="details" style="display:none">
      <div class="grid">
        <div class="card">
          <div class="label">Issue</div>
          <div class="value" id="issue"></div>
        </div>
        <div class="card">
          <div class="label">Status</div>
          <div class="value" id="status"></div>
        </div>

        <div class="card">
          <div class="label">Urgency</div>
          <div class="value" id="urgency"></div>
        </div>
        <div class="card">
          <div class="label">Preferred Time</div>
          <div class="value" id="preferred_time"></div>
        </div>

        <div class="card" style="grid-column:1 / -1">
          <div class="label">Description</div>
          <pre id="description"></pre>
        </div>

        <div class="card">
          <div class="label">Customer</div>
          <div class="value" id="customer"></div>
        </div>
        <div class="card">
          <div class="label">Assigned Plumber</div>
          <div class="value" id="plumber"></div>
        </div>

        <div class="card" style="grid-column:1 / -1">
          <div class="label">Address</div>
          <div class="value" id="address"></div>
        </div>
      </div>

      <div id="adminControls" style="display:none;margin-top:14px">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
          <select id="plumberSelect" style="padding:8px;border-radius:8px;border:1px solid #e6eef5">
            <option value="">Select plumber to assign</option>
          </select>
          <input id="scheduledTime" type="datetime-local" style="padding:8px;border-radius:8px;border:1px solid #e6eef5" />
          <button class="btn primary" id="btnAssign">Assign</button>
          <select id="statusSelect" style="padding:8px;border-radius:8px;border:1px solid #e6eef5">
            <option value="assigned">Assign</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <button class="btn secondary" id="btnAdminStatus">Update Status</button>
        </div>
        <div class="actions">
          <button class="btn primary" id="btnRefresh">Refresh</button>
          <button class="btn secondary" onclick="history.back()">Back</button>
        </div>
      </div>
    </div>

    <div id="errorMsg" style="display:none;color:#b00020;margin-top:12px"></div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:5000';

    function qs(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    async function fetchBooking(id){
      const token = localStorage.getItem('token');
      try{
        const res = await fetch(`${API_BASE_URL}/api/bookings/${id}`, {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        if(!res.ok){
          const body = await res.json().catch(()=> ({}));
          throw new Error(body.error || 'Failed to fetch booking');
        }
        const data = await res.json();
        return data.booking;
      }catch(e){
        throw e;
      }
    }

    function fmtDate(ts){
      try{ return new Date(ts).toLocaleString(); }catch(e){ return ts || '' }
    }

    async function render(){
      const id = qs('id');
      if(!id){
        document.getElementById('metaText').textContent = 'Missing booking id in URL.';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = 'No booking id provided.';
        return;
      }

      document.getElementById('metaText').textContent = `Loading booking ${id}...`;
      try{
        const b = await fetchBooking(id);
        document.getElementById('issue').textContent = b.issue || '-';
        document.getElementById('status').textContent = (b.status || 'pending').toUpperCase();
        document.getElementById('urgency').textContent = b.urgency === 1 ? 'Low' : b.urgency === 2 ? 'Medium' : 'High';
        document.getElementById('preferred_time').textContent = fmtDate(b.preferred_time) || '-';
        document.getElementById('description').textContent = b.description || '-';
        document.getElementById('customer').textContent = b.user_id || '-';
        document.getElementById('plumber').textContent = b.plumber_id || 'Not assigned';
        document.getElementById('address').textContent = b.address || (b.lat && b.lng ? `${b.lat}, ${b.lng}` : '-');

        document.getElementById('metaText').textContent = `Booking ${b.id} • Created: ${fmtDate(b.created_at)}`;
        document.getElementById('details').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';

        // Show admin controls if the user is admin
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if(user && user.role === 'admin'){
          document.getElementById('adminControls').style.display = 'block';
          // populate plumbers
          const plumbers = await loadPlumbers();
          const sel = document.getElementById('plumberSelect');
          sel.innerHTML = '<option value="">Select plumber to assign</option>' + (plumbers.map(p=>`<option value="${p.id}">${p.name}</option>`).join(''));
          document.getElementById('btnAssign').onclick = ()=> assignBooking(b.id);
          document.getElementById('btnAdminStatus').onclick = ()=> adminUpdateStatus(b.id);
        } else {
          document.getElementById('adminControls').style.display = 'none';
        }
      }catch(err){
        document.getElementById('metaText').textContent = 'Error loading booking';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = err.message || String(err);
      }
    }

    document.addEventListener('click', (e)=>{
      // delegated handlers for dynamically shown buttons
    });

    document.getElementById('btnRefresh').addEventListener('click', ()=>{
      render();
    });

    async function loadPlumbers(){
      try{
        const res = await fetch(`${API_BASE_URL}/api/recommendations?limit=50`);
        if(!res.ok) return [];
        const j = await res.json();
        return (j.recommendations || []).map(r=>({id:r.id, name:r.name}));
      }catch(e){
        return [];
      }
    }

    async function assignBooking(id){
      const plumberId = document.getElementById('plumberSelect').value;
      const scheduled = document.getElementById('scheduledTime').value || null;
      if(!plumberId) return alert('Choose a plumber first');
      const token = localStorage.getItem('token');
      try{
        const res = await fetch(`${API_BASE_URL}/api/bookings/${id}/assign`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {})
          },
          body: JSON.stringify({ plumber_id: plumberId, scheduled_time: scheduled })
        });
        if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error||'Assign failed'); }
        alert('Assigned successfully');
        render();
      }catch(err){ alert('Assign error: '+err.message); }
    }

    async function adminUpdateStatus(id){
      const status = document.getElementById('statusSelect').value;
      const token = localStorage.getItem('token');
      try{
        const res = await fetch(`${API_BASE_URL}/api/bookings/${id}/admin_status`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {})
          },
          body: JSON.stringify({ status })
        });
        if(!res.ok){ const b = await res.json().catch(()=>({})); throw new Error(b.error||'Status update failed'); }
        alert('Status updated');
        render();
      }catch(err){ alert('Status update error: '+err.message); }
    }

    // Initial render
    render();
  </script>
</body>
</html>
